<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - NexDine</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #f4f6f8; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 100%; max-width: 400px; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); background: white; }
        .btn-primary { background-color: #1a3c34; border: none; }
        .btn-primary:hover { background-color: #152e28; }
        .brand-title { color: #1a3c34; font-weight: bold; letter-spacing: 2px; }
        .alert-suspended { background-color: #fff3cd; border: 1px solid #ffc107; color: #856404; border-radius: 8px; }
    </style>
</head>
<body>

<div class="login-card">
    <div class="text-center mb-4">
        <i class="fa-solid fa-utensils fa-2x" style="color: #1a3c34;"></i>
        <h3 class="brand-title mt-2">NEXDINE</h3>
    </div>
    
    <form th:action="@{/login}" method="POST">
        <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" placeholder="Ej: jesus" required>
        </div>
        <div class="mb-3">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" placeholder="Contraseña" required>
        </div>
        
        <!-- Error de credenciales incorrectas -->
        <div th:if="${error != null and error != 'Usuario suspendido'}" class="alert alert-danger small mb-3">
            <i class="fa-solid fa-circle-exclamation me-1"></i>
            <span th:text="${error}"></span>
        </div>

        <!-- Error de usuario suspendido -->
        <div th:if="${error == 'Usuario suspendido'}" class="alert alert-suspended small mb-3 d-flex align-items-center gap-2">
            <i class="fa-solid fa-ban fa-lg text-warning"></i>
            <div>
                <strong>Usuario suspendido</strong><br>
                Tu cuenta ha sido desactivada. Contacta al administrador.
            </div>
        </div>

        <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Iniciar Sesión
        </button>
    </form>
</div>

</body>
</html>
