# Configuración del servidor
server.port=8080

# Configuración de H2 Database
spring.datasource.url=jdbc:h2:mem:nextdinedb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilitar la consola de H2 (opcional para desarrollo en http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Actualización automática de tablas
spring.jpa.hibernate.ddl-auto=update